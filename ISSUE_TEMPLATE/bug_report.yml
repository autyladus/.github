name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to file a bug report."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Site / UI
        - System / API
        - Automation / pipeline
        - Web3 integration
        - Infrastructure / deploy
    validations:
      required: true

  - type: textarea
    id: web3_context
    attributes:
      label: Web3 context (if applicable)
      description: "Chain, contract address, RPC endpoint, wallet type — omit any sensitive info"
      placeholder: "Chain: Ethereum mainnet\nContract: 0x...\nWallet: MetaMask"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser, OS, Node version, relevant package versions"
