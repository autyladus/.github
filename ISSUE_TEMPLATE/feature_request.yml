name: "\U0001F680 Feature request"
description: Suggest an idea or improvement for Autiladus.
title: "[Feat] "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Tell us what you want to see. The clearer the scope, the faster we can ship.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Clear one-liner
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What pain does this solve?
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Commands, UX, or API behavior you expect.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you tried or rejected.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Links, prior art, or screenshots.
