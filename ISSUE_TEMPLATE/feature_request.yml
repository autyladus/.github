name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Describe the feature you'd like."

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Context helps prioritize
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Site / UI
        - System / API
        - Automation / pipeline
        - Web3 integration
        - Infrastructure / deploy
    validations:
      required: true

  - type: textarea
    id: web3_context
    attributes:
      label: Web3 context (if applicable)
      description: "Chain, protocol, standard (e.g. ERC-4337, LayerZero) — helps scope the work"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
